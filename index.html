  <style>
    :root {
      color-scheme: light;
      --bg: #e9f7fb;
      --ink: #08283a;
      --muted: #526f7c;
      --line: #0987b8;
      --deep: #06364b;
      --card: #f7fcff;
      --shadow: 0 18px 40px rgba(0, 76, 112, .16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(0, 174, 214, .22), transparent 32rem),
        radial-gradient(circle at 80% 75%, rgba(55, 191, 224, .18), transparent 30rem),
        linear-gradient(135deg, #f2fbff 0%, var(--bg) 54%, #d8eef7 100%);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
    }
    header {
      padding: clamp(1.4rem, 4vw, 3.5rem) clamp(1rem, 5vw, 4rem) 1rem;
      max-width: 1180px;
    }
    h1 {
      font-size: clamp(2rem, 7vw, 5rem);
      line-height: .95;
      margin: 0 0 .8rem;
      letter-spacing: -.05em;
    }
    .dek {
      color: var(--muted);
      font-family: system-ui, sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      margin: 0;
      max-width: 720px;
    }
    .timeline-shell {
      padding: 2rem clamp(1rem, 5vw, 4rem) 3rem;
      position: relative;
    }
    .timeline-nav {
      display: none;
    }
    .stats {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      padding: 1.25rem clamp(1rem, 5vw, 4rem) 0;
      max-width: 1280px;
    }
    .stat {
      background: rgba(247, 252, 255, .78);
      border: 1px solid rgba(8, 40, 58, .12);
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(0, 76, 112, .09);
      padding: 1rem;
    }
    .stat-label {
      color: var(--muted);
      font-family: system-ui, sans-serif;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .stat-value {
      font-size: clamp(1.3rem, 3vw, 2rem);
      line-height: 1.05;
      margin-top: .35rem;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: .55rem;
      padding: 1.25rem clamp(1rem, 5vw, 4rem) 0;
    }
    .filter {
      background: #f7fcff;
      border: 1px solid rgba(8, 40, 58, .16);
      border-radius: 999px;
      color: var(--ink);
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: .92rem;
      padding: .58rem .82rem;
    }
    .filter[aria-pressed="true"] {
      background: var(--line);
      border-color: var(--line);
      color: white;
    }
    .timeline {
      --pad-top: 1.4rem;
      --rail-y: 250px;
      --rail-width: 100%;
      align-items: stretch;
      display: flex;
      min-height: 560px;
      overflow-x: auto;
      overflow-y: visible;
      padding: var(--pad-top) 2rem 1rem;
      position: relative;
      scroll-snap-type: x mandatory;
      scrollbar-color: var(--line) rgba(255,255,255,.6);
    }
    .timeline::before {
      background:
        linear-gradient(90deg, transparent 0, rgba(9,135,184,.28) 1.5rem, var(--line) 4rem, var(--line) calc(100% - 4rem), rgba(9,135,184,.28) calc(100% - 1.5rem), transparent 100%),
        repeating-linear-gradient(90deg, transparent 0 118px, rgba(255,255,255,.7) 118px 121px);
      content: '';
      height: 6px;
      left: 0;
      position: absolute;
      top: calc(var(--rail-y) - 3px);
      width: var(--rail-width);
      z-index: 0;
    }
    .month-marker {
      align-self: stretch;
      flex: 0 0 64px;
      margin-left: var(--gap, 32px);
      position: relative;
      z-index: 1;
    }
    .month-marker::before {
      background: rgba(6, 54, 75, .38);
      content: '';
      height: 44px;
      left: 50%;
      position: absolute;
      top: calc(var(--rail-y) - 19px - var(--pad-top));
      transform: translateX(-50%);
      width: 2px;
    }
    .month-marker span {
      background: var(--deep);
      border-radius: 999px;
      color: white;
      display: inline-block;
      font-family: system-ui, sans-serif;
      font-size: .78rem;
      font-weight: 800;
      left: 50%;
      letter-spacing: .08em;
      padding: .35rem .55rem;
      position: absolute;
      text-transform: uppercase;
      top: calc(var(--rail-y) + 28px - var(--pad-top));
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .milestone {
      align-self: stretch;
      flex: 0 0 112px;
      margin-left: var(--gap, 36px);
      position: relative;
      scroll-snap-align: center;
      z-index: 2;
    }
    .milestone::before {
      background: linear-gradient(var(--deep), rgba(6,54,75,.12));
      content: '';
      height: 76px;
      left: 50%;
      position: absolute;
      top: calc(var(--rail-y) - 76px - var(--pad-top));
      transform: translateX(-50%);
      width: 2px;
    }
    .milestone::after {
      background: var(--deep);
      border: 4px solid #f7fcff;
      border-radius: 999px;
      box-shadow: 0 0 0 3px rgba(6,54,75,.14);
      content: '';
      height: 18px;
      left: 50%;
      position: absolute;
      top: calc(var(--rail-y) - var(--pad-top));
      transform: translate(-50%, -50%);
      width: 18px;
    }
    .milestone-badge {
      background: var(--deep);
      border-radius: 18px 18px 18px 4px;
      box-shadow: 0 16px 30px rgba(6,54,75,.18);
      color: #f7fcff;
      font-family: system-ui, sans-serif;
      left: 50%;
      min-width: 144px;
      padding: .62rem .7rem;
      position: absolute;
      top: calc(var(--rail-y) - 142px - var(--pad-top));
      transform: translateX(-50%);
    }
    .milestone.special .milestone-badge {
      background: var(--line);
      box-shadow: 0 16px 30px rgba(9,135,184,.2);
    }
    .milestone-label {
      display: block;
      font-size: .66rem;
      font-weight: 900;
      letter-spacing: .08em;
      margin-bottom: .25rem;
      opacity: .78;
      text-transform: uppercase;
    }
    .milestone-title {
      display: block;
      font-size: .82rem;
      font-weight: 800;
      line-height: 1.15;
    }
    .event {
      flex: 0 0 clamp(310px, 25vw, 360px);
      margin-left: var(--gap, 40px);
      min-height: 500px;
      position: relative;
      scroll-snap-align: center;
      z-index: 1;
    }
    .event:first-child { margin-left: 0; }
    .tick {
      height: 70px;
      left: 50%;
      position: absolute;
      top: calc(var(--rail-y) - 14px - var(--pad-top));
      transform: translateX(-50%);
      width: 86px;
      z-index: 3;
    }
    .dot {
      background: var(--line);
      border: 5px solid #f7fcff;
      border-radius: 999px;
      box-shadow: 0 0 0 3px rgba(9,135,184,.25), 0 8px 18px rgba(0,76,112,.2);
      height: 28px;
      left: 50%;
      position: absolute;
      top: 14px;
      transform: translate(-50%, -50%);
      width: 28px;
    }
    .tick-date {
      background: rgba(247, 252, 255, .94);
      border: 1px solid rgba(8, 40, 58, .12);
      border-radius: 999px;
      color: var(--line);
      font-family: system-ui, sans-serif;
      font-size: .78rem;
      font-weight: 900;
      left: 50%;
      letter-spacing: .04em;
      padding: .25rem .55rem;
      position: absolute;
      top: 35px;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .stem {
      background: linear-gradient(var(--line), rgba(9,135,184,.08));
      left: 50%;
      position: absolute;
      transform: translateX(-50%);
      width: 3px;
      z-index: 1;
    }
    .event.top .stem {
      height: 58px;
      top: calc(var(--rail-y) - 58px - var(--pad-top));
    }
    .event.bottom .stem {
      height: 54px;
      top: calc(var(--rail-y) + 3px - var(--pad-top));
    }
    .card {
      background: color-mix(in srgb, var(--card) 94%, white);
      border: 1px solid rgba(8, 40, 58, .12);
      border-radius: 24px;
      box-shadow: var(--shadow);
      color: inherit;
      display: grid;
      grid-template-columns: 36% 64%;
      left: 0;
      min-height: 178px;
      overflow: hidden;
      position: relative;
      text-decoration: none;
      transition: transform .18s ease, box-shadow .18s ease;
      width: 100%;
    }
    .event.top .card {
      top: calc(var(--rail-y) - 238px - var(--pad-top));
    }
    .event.bottom .card {
      top: calc(var(--rail-y) + 72px - var(--pad-top));
    }
    .card:hover, .card:focus-visible {
      box-shadow: 0 24px 52px rgba(0, 76, 112, .25);
      outline: none;
      transform: translateY(-6px);
    }
    .thumb {
      background: #dcc9b8;
      display: block;
      height: 100%;
      min-height: 178px;
      object-fit: cover;
      width: 100%;
    }
    .body {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: .55rem;
      padding: .85rem .95rem;
    }
    .date {
      color: var(--line);
      font-family: system-ui, sans-serif;
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h2 {
      font-size: 1.05rem;
      line-height: 1.08;
      margin: 0;
    }
    .author {
      color: var(--muted);
      font-family: system-ui, sans-serif;
      font-size: .82rem;
      margin-top: auto;
    }
    .hint {
      color: var(--muted);
      font-family: system-ui, sans-serif;
      font-size: .9rem;
      padding: 0 clamp(1rem, 5vw, 4rem) 2rem;
    }
    .hidden { display: none; }
    .empty {
      color: var(--muted);
      font-family: system-ui, sans-serif;
      padding: 1rem clamp(1rem, 5vw, 4rem) 0;
    }
    @media (max-width: 640px) {
      .timeline-shell { padding-top: 1.25rem; }
      .timeline { --rail-y: 230px; min-height: 520px; padding-left: 1rem; padding-right: 1rem; }
      .timeline-nav {
        align-items: center;
        background: rgba(6, 54, 75, .72);
        border: 0;
        color: white;
        cursor: pointer;
        display: flex;
        font-size: 2rem;
        font-weight: 900;
        justify-content: center;
        opacity: .92;
        position: absolute;
        top: 1.25rem;
        bottom: 3rem;
        width: 42px;
        z-index: 20;
      }
      .timeline-nav:disabled {
        cursor: default;
        opacity: .22;
      }
      .timeline-nav.prev {
        border-radius: 0 20px 20px 0;
        left: 0;
      }
      .timeline-nav.next {
        border-radius: 20px 0 0 20px;
        right: 0;
      }
      .event { flex-basis: 88vw; min-height: 480px; }
      .month-marker { flex-basis: 56px; }
      .milestone { flex-basis: 118px; }
      .milestone-badge { min-width: 128px; }
      .thumb { min-height: 170px; }
      .card { min-height: 170px; border-radius: 20px; }
      h2 { font-size: .98rem; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 420px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>

    "imageUrl": "https://d15-a.sdn.cz/d_15/c_img_qC_A/nO2CysqjGrRICCMjQG4TTfU/d3a7/dansko-keporkak-velryba-timmy-mrsina.jpeg",

    const formatter = new Intl.DateTimeFormat('cs-CZ', { dateStyle: 'medium', timeStyle: 'short' });
    const shortDateFormatter = new Intl.DateTimeFormat('cs-CZ', { day: 'numeric', month: 'short' });
    const monthFormatter = new Intl.DateTimeFormat('cs-CZ', { month: 'long', year: 'numeric' });
    const dayFormatter = new Intl.NumberFormat('cs-CZ', { maximumFractionDigits: 1 });
    const timeline = document.getElementById('timeline');
    const filters = document.getElementById('filters');
    const empty = document.getElementById('empty');
    const prevEvent = document.getElementById('prevEvent');
    const nextEvent = document.getElementById('nextEvent');
    let activeAuthor = 'Všichni';

    function daysBetween(a, b) {
      return Math.abs(new Date(b.dateTime.replace(' ', 'T') + '+01:00') - new Date(a.dateTime.replace(' ', 'T') + '+01:00')) / 86400000;
    }

    function articleDate(article) {
      return new Date(article.dateTime.replace(' ', 'T') + '+01:00');
    }

    function monthKey(article) {
      const date = articleDate(article);
      return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
    }

    function eventGap(previous, current) {
      if (!previous) return 0;
      const days = Math.abs((articleDate(current) - articleDate(previous)) / 86400000);
      return Math.round(Math.min(105, Math.max(18, days * 9)));
    }

    function articleByTitle(fragment) {
      return articles.find((article) => article.title.toLocaleLowerCase('cs-CZ').includes(fragment.toLocaleLowerCase('cs-CZ')));
    }

    function articleByLinkId(id) {
      return articles.find((article) => article.link.endsWith(String(id)));
    }

    function timelineMilestones() {
      const gaps = articles.slice(1).map((article, index) => ({
        days: daysBetween(articles[index], article),
        dateTime: article.dateTime,
        after: articles[index],
        before: article,
      }));
      const biggest = gaps.reduce((best, gap) => gap.days > best.days ? gap : best, gaps[0]);
      const shortest = gaps.reduce((best, gap) => gap.days < best.days ? gap : best, gaps[0]);
      const fixed = [
        ['Začátek příběhu', 'První uvíznutí u německých břehů', articleByLinkId(40569605)],
        ['Záchrana nabírá obrátky', 'První velká vyprošťovací akce', articleByLinkId(40570205)],
        ['Timmy dostává jméno', 'Příběh už sledují i čtenáři pod jménem Timmy', articleByTitle('plakala')],
        ['Zlom', 'Soukromá záchrana po rozhodnutí úřadů', articleByTitle('milionáři')],
        ['Vyproštění', 'Timmy míří v člunu do Severního moře', articleByLinkId(40575617)],
        ['Ticho', 'Sledovací signál se odmlčel', articleByTitle('odmlčel')],
        ['Konec pátrání', 'U Dánska je nalezena mrtvá velryba', articleByLinkId(40578257)],
        ['Poslední stopa', 'Data ze zařízení popisují poslední hodiny', articleByLinkId(40583004)],
      ].filter(([, , article]) => article).map(([label, title, article]) => ({
        type: 'milestone',
        label,
        title,
        dateTime: article.dateTime,
        special: false,
      }));

      return [
        ...fixed,
        {
          type: 'milestone',
          label: 'Největší mezera',
          title: gapLabel(biggest.days) + ' bez článku',
          dateTime: biggest.before.dateTime,
          special: true,
        },
        {
          type: 'milestone',
          label: 'Nejkratší mezera',
          title: gapLabel(shortest.days) + ' mezi články',
          dateTime: shortest.before.dateTime,
          special: true,
        },
      ];
    }

    function makeMilestoneNode(milestone, previousItem) {
      const node = document.createElement('aside');
      node.className = 'milestone' + (milestone.special ? ' special' : '');
      node.style.setProperty('--gap', eventGap(previousItem, milestone) + 'px');

      const badge = document.createElement('div');
      badge.className = 'milestone-badge';
      const label = document.createElement('span');
      label.className = 'milestone-label';
      label.textContent = milestone.label;
      const title = document.createElement('span');
      title.className = 'milestone-title';
      title.textContent = milestone.title;
      badge.append(label, title);
      node.append(badge);
      return node;
    }

    function gapLabel(days) {
      if (days < 1) return Math.round(days * 24) + ' h';
      if (Math.abs(days - 1) < 0.05) return '1 den';
      if (days < 2) return dayFormatter.format(days) + ' dne';
      return dayFormatter.format(days) + ' dní';
    }

    function authorCounts() {
      const counts = new Map();
      for (const article of articles) {
        for (const author of article.author.split(',').map((value) => value.trim()).filter(Boolean)) {
          counts.set(author, (counts.get(author) || 0) + 1);
        }
      }
      return [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'cs-CZ'));
    }

    function renderStats() {
      const gaps = articles.slice(1).map((article, index) => ({ days: daysBetween(articles[index], article), from: articles[index], to: article }));
      const biggest = gaps.reduce((best, gap) => gap.days > best.days ? gap : best, gaps[0]);
      const shortest = gaps.reduce((best, gap) => gap.days < best.days ? gap : best, gaps[0]);
      const top = authorCounts()[0];

      document.getElementById('totalStat').textContent = String(articles.length);
      document.getElementById('biggestGap').textContent = gapLabel(biggest.days);
      document.getElementById('shortestGap').textContent = gapLabel(shortest.days);
      document.getElementById('topAuthor').textContent = top ? top[0] + ' (' + top[1] + ')' : '—';
    }

    function renderFilters() {
      filters.replaceChildren();
      const entries = [['Všichni', articles.length], ...authorCounts()];
      for (const [author, count] of entries) {
        const button = document.createElement('button');
        button.className = 'filter';
        button.type = 'button';
        button.textContent = author + ' (' + count + ')';
        button.setAttribute('aria-pressed', String(author === activeAuthor));
        button.addEventListener('click', () => {
          activeAuthor = author;
          renderFilters();
          renderTimeline();
        });
        filters.append(button);
      }
    }

    function visibleArticles() {
      if (activeAuthor === 'Všichni') return articles;
      return articles.filter((article) => article.author.split(',').map((value) => value.trim()).includes(activeAuthor));
    }

    function timelineTargets() {
      return [...timeline.querySelectorAll('.event, .milestone')];
    }

    function targetCenter(target) {
      return target.offsetLeft + target.offsetWidth / 2;
    }

    function updateTimelineNav() {
      const targets = timelineTargets();
      if (targets.length === 0) {
        prevEvent.disabled = true;
        nextEvent.disabled = true;
        return;
      }

      const viewportCenter = timeline.scrollLeft + timeline.clientWidth / 2;
      prevEvent.disabled = !targets.some((target) => targetCenter(target) < viewportCenter - 8);
      nextEvent.disabled = !targets.some((target) => targetCenter(target) > viewportCenter + 8);
    }

    function scrollTimeline(direction) {
      const targets = timelineTargets();
      const viewportCenter = timeline.scrollLeft + timeline.clientWidth / 2;
      const target = direction > 0
        ? targets.find((item) => targetCenter(item) > viewportCenter + 8)
        : [...targets].reverse().find((item) => targetCenter(item) < viewportCenter - 8);

      if (!target) return;
      timeline.scrollTo({ left: targetCenter(target) - timeline.clientWidth / 2, behavior: 'auto' });
      updateTimelineNav();
    }

    function renderTimeline() {
      const visible = visibleArticles();
      timeline.replaceChildren();
      document.getElementById('count').textContent = visible.length + ' z ' + articles.length;
      empty.classList.toggle('hidden', visible.length > 0);
      const milestones = activeAuthor === 'Všichni' ? timelineMilestones() : [];
      const items = [
        ...visible.map((article) => ({ type: 'article', ...article })),
        ...milestones,
      ].sort((a, b) => articleDate(a) - articleDate(b) || (a.type === 'milestone' ? -1 : 1));
      let previousItem = null;
      let previousMonth = '';
      let renderedArticles = 0;

      for (const [index, item] of items.entries()) {
        const currentMonth = monthKey(item);
        if (currentMonth !== previousMonth) {
          const marker = document.createElement('div');
          marker.className = 'month-marker';
          marker.style.setProperty('--gap', (previousItem ? Math.max(24, eventGap(previousItem, item) - 20) : 0) + 'px');
          const label = document.createElement('span');
          label.textContent = monthFormatter.format(articleDate(item));
          marker.append(label);
          timeline.append(marker);
          previousMonth = currentMonth;
        }

        if (item.type === 'milestone') {
          timeline.append(makeMilestoneNode(item, previousItem));
          previousItem = item;
          continue;
        }

        const article = item;

        const event = document.createElement('article');
        event.className = 'event ' + (index % 2 === 0 ? 'top' : 'bottom');
        event.style.setProperty('--gap', eventGap(previousItem, article) + 'px');

        const tick = document.createElement('div');
        tick.className = 'tick';
        const dot = document.createElement('div');
        dot.className = 'dot';
        const tickDate = document.createElement('div');
        tickDate.className = 'tick-date';
        tickDate.textContent = shortDateFormatter.format(articleDate(article));
        tick.append(dot, tickDate);

        const stem = document.createElement('div');
        stem.className = 'stem';

        const card = document.createElement('a');
        card.className = 'card';
        card.href = article.link;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';

        const image = document.createElement('img');
        image.className = 'thumb';
        image.loading = renderedArticles < 4 ? 'eager' : 'lazy';
        image.decoding = 'async';
        image.src = article.imageUrl;
        image.alt = article.title;

        const body = document.createElement('div');
        body.className = 'body';

        const date = document.createElement('div');
        date.className = 'date';
        date.textContent = formatter.format(new Date(article.dateTime.replace(' ', 'T') + '+01:00'));

        const title = document.createElement('h2');
        title.textContent = article.title;

        const author = document.createElement('div');
        author.className = 'author';
        author.textContent = article.author;

        body.append(date, title, author);
        card.append(image, body);
        event.append(tick, stem, card);
        timeline.append(event);
        previousItem = article;
        renderedArticles += 1;
      }

      requestAnimationFrame(() => {
        timeline.style.setProperty('--rail-width', timeline.scrollWidth + 'px');
        updateTimelineNav();
      });
    }

    prevEvent.addEventListener('click', () => scrollTimeline(-1));
    nextEvent.addEventListener('click', () => scrollTimeline(1));
    timeline.addEventListener('scroll', () => requestAnimationFrame(updateTimelineNav), { passive: true });

    renderStats();
    renderFilters();
    renderTimeline();
  </script>
